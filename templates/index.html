<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sensors</title>
    <style>
        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .card {
            border: 1px solid #ccc;
            padding: 16px;
            border-radius: 8px;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div id="content">Waiting for data...</div>

    <script>
        setInterval(async () => {
            const res = await fetch("/api/weather");
            const data = await res.text();
            document.getElementById("content").innerHTML = data;
        }, 1000);
    </script>
</body>
</html>
